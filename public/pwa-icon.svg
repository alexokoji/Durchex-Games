<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="55%" stop-color="#00cc6a"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Solid dark backdrop so the icon looks correct as a maskable
       (Android masks against arbitrary shapes — we need safe-area padding). -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#0a0c10"/>

  <!-- Hex crest centred inside the maskable safe zone (~80% of the canvas). -->
  <polygon
    points="256,56 432,148 432,364 256,456 80,364 80,148"
    fill="url(#bg)"
    stroke="url(#stroke)"
    stroke-width="12"/>
  <polygon
    points="256,96 400,170 400,342 256,416 112,342 112,170"
    fill="none"
    stroke="rgba(255,255,255,0.18)"
    stroke-width="5"/>

  <!-- DiG wordmark -->
  <g filter="url(#glow)" font-family="'Helvetica Neue','Roboto',sans-serif" font-weight="900">
    <text x="120" y="318" font-size="170" fill="#000" letter-spacing="-8">D</text>
    <text x="232" y="318" font-size="170" fill="#FFC659" letter-spacing="-4" font-style="italic">i</text>
    <text x="296" y="318" font-size="170" fill="#000" letter-spacing="-8">G</text>
  </g>
</svg>
